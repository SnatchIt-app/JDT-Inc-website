# Autonomous draft pipeline.
#
# Weekly cron. Picks the highest-priority cluster gap, generates a
# brief, generates a full article draft, lints it, and opens a PR.
#
# Every PR opens against main with status="draft" — the human reviewer
# is the merge gate. They edit if needed, set status="published"
# (or "scheduled" + publishAt), and merge. CI re-runs the editorial
# linter on the human's changes.

name: autonomous-draft

on:
  schedule:
    # Mondays at 14:00 UTC (10:00 ET) — fresh for the week.
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic slug (optional)"
        required: false
        type: string
      kind:
        description: "Override kind (pillar | supporting)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate brief
        id: brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.topic }}" ] && [ -n "${{ inputs.kind }}" ]; then
            BRIEF_PATH=$(npm run --silent editorial:brief -- \
              --topic="${{ inputs.topic }}" --kind="${{ inputs.kind }}")
          else
            BRIEF_PATH=$(npm run --silent editorial:brief)
          fi
          echo "path=$BRIEF_PATH" >> $GITHUB_OUTPUT
          echo "Brief written to: $BRIEF_PATH"

      - name: Generate draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run --silent editorial:draft -- --brief="${{ steps.brief.outputs.path }}"

      - name: Editorial lint (warnings allowed; errors block)
        run: npm run editorial:lint
        continue-on-error: false

      - name: TypeScript typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Open PR with draft
        uses: peter-evans/create-pull-request@v6
        with:
          branch: autonomous-draft/${{ github.run_id }}
          title: "editorial: autonomous draft (review before publish)"
          body: |
            Auto-generated article draft from the autonomous editorial pipeline.

            **Status: `draft`.** This article will not appear on the site
            until a reviewer:
              1. Reads it end-to-end and edits as needed
              2. Confirms the voice, claims, and internal links
              3. Sets `status: "published"` (or `"scheduled"` + `publishAt`)
              4. Approves and merges this PR

            CI has run the editorial linter and TypeScript check. Brand voice
            violations and AI tells block CI; warnings are surfaced in the
            check log for the reviewer.

            Brief: `${{ steps.brief.outputs.path }}`

            ---
            _Generated by `.github/workflows/autonomous-draft.yml`_
          commit-message: "editorial: autonomous draft"
          add-paths: |
            editorial/briefs/**
            lib/journal.ts
